<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="400" height="80">
  <style>
    .word { font-family: "InterVariable", "Inter", system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 48px; letter-spacing: -0.025em; }
    .light { fill: #1c1917; }
    .dark { fill: #f5f5f4; }
    .accent { fill: #14B8A6; }
    .cursor { fill: #14B8A6; }
    @media (prefers-color-scheme: dark) {
      .light { fill: #f5f5f4; }
    }
  </style>
  <text x="0" y="58" class="word light">Bytes</text>
  <circle cx="135" cy="42" r="5" class="accent"/>
  <text x="150" y="58" class="word light">of</text>
  <text x="200" y="58" class="word light">Life</text>
  <rect x="288" y="28" width="14" height="38" class="cursor">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
